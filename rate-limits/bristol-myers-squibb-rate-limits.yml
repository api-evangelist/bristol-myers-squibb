specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Bristol Myers Squibb
providerId: bristol-myers-squibb
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Pharmaceutical
  - Biopharmaceutical
  - Clinical Trials
  - Digital Health
  - Rate Limiting
description: Bristol Myers Squibb does not publish API rate limits. Programmatic access to medical information,
  clinical trial, and business-development surfaces is contractual; rate-limit terms are conveyed in the
  collaboration agreement and supporting onboarding documents.
sources:
  - https://www.bms.com/researchers-and-partners.html
notes: No public API rate-limit documentation. Limits are partner / collaboration specific.
responseCodes:
  throttled: 429
  serviceUnavailable: 503
limits:
  - name: Partner / collaboration APIs
    scope: contract
    metric: varies
    limit: 'see collaboration agreement'
    notes: Per-partner values bound to the data sharing or research collaboration agreement.
policies:
  - name: Backoff Strategy
    description: Apply exponential backoff with jitter on 429 / 503 responses; honor Retry-After when
      present.
  - name: Contract-Bound Capacity
    description: Effective request capacity is set by the collaboration agreement, not via a public tier
      page.
  - name: Fair Use
    description: Sustained traffic that materially impacts shared infrastructure may trigger throttling
      regardless of contract.
maintainers:
  - FN: Kin Lane
    email: info@apievangelist.com
