description: >-
  Bristol Myers Squibb (BMS) is a global Fortune 500 biopharmaceutical company
  committed to discovering, developing, and delivering innovative medicines for
  patients with serious diseases. BMS focuses on oncology, immunology, cardiovascular,
  fibrosis, and cell therapy (CAR T). The company operates BMS Study Connect for
  clinical trial recruitment, a Medical Information portal for healthcare providers,
  and the BMS Business Development platform for research partnerships and data
  sharing. BMS actively pursues technology partnerships in protein degradation,
  advanced treatment modalities, and digital health.
