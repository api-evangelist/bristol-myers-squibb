specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Bristol Myers Squibb
providerId: bristol-myers-squibb
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Pharmaceutical
  - Biopharmaceutical
  - Oncology
  - Immunology
  - Cardiovascular
  - Clinical Trials
  - Digital Health
description: Bristol Myers Squibb is a Fortune 500 biopharmaceutical company. It does not operate a public,
  commercial developer platform with a published price list. The Medical Information portal, BMS Study
  Connect (clinical trial recruitment), and Business Development platform exist for healthcare providers,
  patients, and research partners and are accessed under collaboration / partnership agreements rather
  than as priced API products. Independent researchers may apply to the BMS data sharing request process.
sources:
  - https://www.bms.com/researchers-and-partners.html
  - https://www.bmsstudyconnect.com/
notes: BMS does not publish API pricing; access to medical information, study, and business-development
  surfaces is contractual / partnership-based. Reconcile against the relevant collaboration agreement.
plans:
  - id: bristol-myers-squibb-research-collaboration
    name: Research / Partnership Collaboration
    type: enterprise
    description: Access to BMS medical information, clinical trial, and business-development data surfaces
      under a research collaboration, partnership, or data-sharing agreement.
    entries:
      - label: Collaboration agreement
        name: collaboration_agreement
        type: subscription
        metric: agreement
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: see partnership agreement
        userMultiplied: false
      - label: Data sharing request
        name: data_sharing_request
        type: quota
        metric: request
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: governed by request process
        userMultiplied: false
    elements:
      - name: Medical Information Portal
      - name: BMS Study Connect
      - name: BMS Business Development
      - name: Independent Researcher Data Sharing
