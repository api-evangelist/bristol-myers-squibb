meters:
  - name: collaboration_agreement
    description: Active research / partnership / data sharing agreement between BMS and the consuming
      organization.
    unit: agreement
    aggregation: count
    dimensions:
      - program
      - therapeutic_area
  - name: data_sharing_request
    description: Independent researcher data sharing requests submitted and approved.
    unit: request
    aggregation: sum
    dimensions:
      - therapeutic_area
      - study
principles:
  - name: Visibility
    description: Track active collaboration agreements, scope of data shared, and reporting deliverables
      under each agreement; reconcile internal usage against contract terms.
  - name: Allocation
    description: Allocate program costs to therapeutic-area research budgets and to the partnerships /
      business development function rather than to engineering platform cost.
  - name: Optimization
    description: Consolidate data sharing requests across teams, reuse anonymized study data where contract
      terms allow, and align renewal cadence with research milestones.
  - name: Accountability
    description: Designate a research / partnership owner for each BMS agreement; track deliverables,
      data-sharing scope, and contractual obligations on a defined cadence.
