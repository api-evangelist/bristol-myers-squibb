description: 'FOCUS-aligned FinOps for Bristol Myers Squibb: not a commercial API publisher. Programmatic
  surfaces (Medical Information portal, BMS Study Connect, Business Development, data sharing) are accessed
  under research and partnership agreements. Cost is governed by the underlying collaboration contract,
  not metered API spend.'
sources:
  - https://www.bms.com/researchers-and-partners.html
notes: BMS is not billed as an API service. Reconcile against the relevant research collaboration / partnership
  agreement for any cost or commitment terms.
billingModel:
  pricingCategory: Research Collaboration
  billingFrequency: Per-Agreement
  billingCurrency: USD
  chargeCategories:
    - Adjustment
    - Tax
focusColumns:
  ServiceName: Bristol Myers Squibb
  ServiceCategory: Pharmaceutical
